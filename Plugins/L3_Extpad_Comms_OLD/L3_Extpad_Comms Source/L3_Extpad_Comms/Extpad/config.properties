###############################################
# CraMission Configuration
###############################################
app_binary_name = rampaged
app_install_path = .
app_storage_path = .
var_install_path = .

application.version = @APPLICATION_BUILD_VERSION@

# discovery
cra.autoDiscoveryPrefix = EXTPAD
cra.autoDiscoveryEnabled = true

# excom
cra.serviceAddress = 127.0.0.1
cra.servicePort = 11001
cra.useApplicationMessageParsers = false
cra.rootMessageParserName = AccessoryDaemonTransportMessageParser

# platform config
cra.sysmanEnabled = true
sysman.platformName = windows
sysman.runBistOnStartup = false
sysman.systemClientArbiterSupported = false
cra.dataStorageEnabled = false
platform.common.appMgr.wdFifoPath = /tmp/rampaged_wd
platform.alarmListenerSupport = false
platform.bluetoothControllerSupport = false
platform.contactClosureSupport = false
platform.dspDeviceSupport = false
platform.circularDspMemoryReaderSupport = false
platform.ethernetSupport = false
platform.fileSystemSupport = false
platform.ftpServiceSupport = false
platform.outboundFtpSupport = false
platform.gpsDeviceSupport = false
platform.ledControllerSupport = false
platform.powerSupport = false
platform.powerAmplifierSupport = false
platform.realTimeClockSupport = false
platform.rfCardSupport = false
platform.temperatureMonitorSupport = false

###############################################
# EXTPAD Configuration
###############################################
extpad.device.readWriteTimeoutSeconds = 1
extpad.mode.reducedConsoleOutput = true
extpad.mode.pollStatusIntervalSeconds = 3
extpad.mode.readBackAfterWrite = false
extpad.mode.numRetriesOnReadBackAfterWriteFailure = 3
extpad.mode.simulateExtPa = false
extpad.mode.simulatedDeviceType = RAMPAGE_5G
# extpad.mode.validationMode = AUTO
extpad.mode.serviceAddress = 127.0.0.1
extpad.mode.servicePort = 11001
extpad.mode.ftdiChipConnectedToFpga = true
extpad.mode.activateStatusTimer = false
extpad.mode.pathConfigurationLedTimeoutMs = 500
extpad.mode.calibrationCsvFileName = rampage5g_cal.csv

