### Channels ####################################

# Default Channel configuration
logging.loggers.root.channel.class    = SplitterChannel
logging.loggers.root.channel.channel1 = consoleChannel
# Enable this line for normal file logging
logging.loggers.root.channel.channel2 = defaultFileChannel
# Enable this line for extended file logging
#logging.loggers.root.channel.channel3 = bigFileChannel

### Console #####################################
logging.channels.consoleChannel.class = ConsoleChannel
logging.channels.consoleChannel.formatter.class = PatternFormatter
logging.channels.consoleChannel.formatter.pattern = %H:%M:%S.%i [ %q - %I - %s ]: %t
logging.channels.consoleChannel.formatter.times = UTC

logging.filepattern = %Y-%m-%d %H:%M:%S.%i [ %q - %I(%T) - %s ]: %t
### File - Default ##############################
logging.channels.defaultFileChannel.class                = FileChannel
logging.channels.defaultFileChannel.path                 = rampaged.log
logging.channels.defaultFileChannel.formatter.class      = PatternFormatter
logging.channels.defaultFileChannel.formatter.pattern    = ${logging.filepattern}
logging.channels.defaultFileChannel.formatter.times      = UTC
logging.channels.defaultFileChannel.archive              = timestamp
logging.channels.defaultFileChannel.rotation             = 1024K
logging.channels.defaultFileChannel.compress             = true
logging.channels.defaultFileChannel.purgeCount           = 5

### File - Extended #############################
logging.channels.bigFileChannel.class                = FileChannel
logging.channels.bigFileChannel.path                 = rampaged.log
logging.channels.bigFileChannel.formatter.class      = PatternFormatter
logging.channels.bigFileChannel.formatter.pattern    = ${logging.filepattern}
logging.channels.bigFileChannel.formatter.times      = UTC
logging.channels.bigFileChannel.archive              = timestamp
logging.channels.bigFileChannel.rotation             = 10240K
logging.channels.bigFileChannel.compress             = true
logging.channels.bigFileChannel.purgeCount           = 10


